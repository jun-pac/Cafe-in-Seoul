<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" /><!-- so Kakao/Naver photo CDNs don't block hotlinking -->

  <title>Cafe in Seoul · 카공 지도</title>
  <meta name="description" content="카공하기 좋은 서울 카페를 지도에서 찾아보세요." />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- PWA: installable web app -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Cafe in Seoul" />

  <!-- Open Graph / social share card (the image that shows when the link is shared) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Cafe in Seoul" />
  <meta property="og:title" content="Cafe in Seoul · 카공하기 좋은 서울 카페 지도" />
  <meta property="og:description" content="카공하기 좋은 서울 카페를 지도에서 찾아보세요." />
  <meta property="og:url" content="https://cafe-in-seoul.com/" />
  <meta property="og:image" content="https://cafe-in-seoul.com/og-image.jpg" />
  <meta property="og:image:width" content="1545" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cafe in Seoul · 카공 지도" />
  <meta name="twitter:description" content="카공하기 좋은 서울 카페를 지도에서 찾아보세요." />
  <meta name="twitter:image" content="https://cafe-in-seoul.com/og-image.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="/vendor/maplibre-gl.css" /><!-- self-hosted: no CDN dependency (works via tunnel/offline) -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header: brand + inline filter bar + actions (no floating panels) -->
    <header id="chrome">
      <div id="topbar">
        <div class="tb__brand">
          <div class="brand__logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
          </div>
          <h1 class="brand__title">Cafe in Seoul</h1>
        </div>
        <div class="tb__actions">
          <button id="addCafeBtn" class="tb__btn tb__btn--accent"></button>
          <button id="addViewBtn" class="tb__btn tb__btn--viewaccent"></button>
          <button id="langToggle" class="tb__btn tb__btn--icon" title="Language / 언어">EN</button>
          <button id="authBtn" class="tb__btn tb__btn--icon" aria-haspopup="dialog">
            <svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </div>
      </div>

      <!-- One compact row: filters + category toggles (no separate header block) -->
      <div id="filterbar">
        <label class="pilltog"><input type="checkbox" id="f-opennow" checked><span data-i18n="f.openNow.short">영업중</span></label>
        <label class="pilltog pilltog--like" title="좋아요한 곳만 보기"><input type="checkbox" id="f-liked"><span data-i18n="f.liked">♥</span></label>
        <label class="pilltog pilltog--cafe"><input type="checkbox" id="show-cafes" checked><span data-i18n="show.cafes">주인장 추천 카페</span></label>
        <label class="pilltog pilltog--view"><input type="checkbox" id="show-views" checked><span data-i18n="show.views">주인장 추천 명소</span></label>
        <span class="fbar__sep"></span>
        <label class="fbar__field fbar__field--price"><span data-i18n="f.price">아아</span>
          <input type="range" id="f-price" class="fbar__range" min="3000" max="7500" step="500" value="7500">
          <b id="f-price-val" class="fbar__num"></b></label>
        <button id="filterMore" class="fbar__more" aria-expanded="true">
          <span data-i18n="filters.more">상세</span>
          <svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <span class="fbar__result"><span data-i18n="result.shown">표시중</span> <b id="result-count">-</b></span>
      </div>

      <!-- Advanced filters (open by default so people find them) -->
      <div id="filteradv">
        <!-- the 6 essentials, forced onto ONE row -->
        <div class="adv-primary">
          <label class="pilltog tip"><input type="checkbox" id="f-multifloor"><span data-i18n="f.multiFloor.short" data-tip-i18n="def.floors">다층</span></label>
          <label class="pilltog tip"><input type="checkbox" id="f-openlate"><span data-i18n="f.openLate.short" data-tip-i18n="def.openLate">늦게까지</span></label>
          <label class="pilltog tip"><input type="checkbox" id="f-view"><span data-i18n="f.view.short" data-tip-i18n="def.view">뷰</span></label>
          <label class="pilltog tip"><input type="checkbox" id="f-rainok"><span data-tip-i18n="def.rain_ok" aria-label="우천시"><svg class="ic" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12a10.06 10.06 0 0 0-20 0Z"/><path d="M12 12v8a2 2 0 0 0 4 0"/><path d="M12 2v1"/></svg></span></label>
          <select id="f-size" class="input input--xs">
            <option value="" data-i18n="f.size.all">면적 전체</option>
            <option value="medium" data-i18n="f.size.medium">면적 중형+</option>
            <option value="large" data-i18n="f.size.large">면적 대형</option>
          </select>
          <span class="finfo tip" data-tip-i18n="def.size" aria-label="면적 기준"><svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></span>
          <select id="f-outlet" class="input input--xs">
            <option value="" data-i18n="f.outlet.all">콘센트 전체</option>
            <option value="few" data-i18n="f.outlet.few">콘센트 있음</option>
            <option value="some" data-i18n="f.outlet.some">콘센트 보통+</option>
            <option value="many" data-i18n="f.outlet.many">콘센트 많음</option>
          </select>
          <span class="finfo tip" data-tip-i18n="def.outlets" aria-label="콘센트 기준"><svg class="ic" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></span>
        </div>
        <!-- ratings + reset drop to a second row -->
        <div class="adv-secondary">
          <label class="fbar__field"><span class="tip" data-i18n="vote.quiet" data-tip-i18n="def.quiet">조용함</span>
            <input type="range" id="f-quiet" class="fbar__range fbar__range--sm" min="0" max="5" step="1" value="0"><b id="f-quiet-val" class="fbar__num"></b></label>
          <label class="fbar__field"><span class="tip" data-i18n="vote.coffee" data-tip-i18n="def.coffee">커피맛</span>
            <input type="range" id="f-coffee" class="fbar__range fbar__range--sm" min="0" max="5" step="1" value="0"><b id="f-coffee-val" class="fbar__num"></b></label>
          <label class="fbar__field"><span data-i18n="vote.restroom">화장실</span>
            <input type="range" id="f-restroom" class="fbar__range fbar__range--sm" min="0" max="5" step="1" value="0"><b id="f-restroom-val" class="fbar__num"></b></label>
          <button id="f-reset" class="linkbtn" data-i18n="filters.reset">초기화</button>
        </div>
      </div>
    </header>

    <!-- Map -->
    <main id="map">
      <div class="cardzoom" id="cardZoom">
        <span class="cardzoom__label" data-i18n="card.size">카드</span>
        <button type="button" id="cardBigger" title="카드 크게" aria-label="카드 크게">＋</button>
        <button type="button" id="cardSmaller" title="카드 작게" aria-label="카드 작게">－</button>
      </div>
      <div id="pendingQueue" class="pending-queue" hidden></div>
      <div id="visitStat" class="visit-stat"></div>
    </main>

    <!-- Detail panel (desktop: resizable right panel below the header · mobile: swipe-down sheet) -->
    <div id="detailResize" class="detail-resize" hidden aria-hidden="true"></div>
    <section id="detail" class="detail" aria-label="카페 상세정보"></section>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="/vendor/maplibre-gl.js"></script><!-- self-hosted -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
